<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanjeev AI — Holistic Health & Medication Safety</title>
  <meta name="description" content="Sanjeev AI monitors your physical and mental health through intelligent medication tracking, detecting dangerous drug interactions and prescription cascades." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@700;900&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Top App Bar -->
    <header id="topbar" class="topbar">
      <div class="topbar-inner">
        <div class="topbar-brand">
          <div class="brand-avatar">
            <span class="material-symbols-outlined brand-icon" style="font-variation-settings: 'FILL' 1; color: var(--primary-fixed);">spa</span>
          </div>
          <h1 class="brand-name">Sanjeev AI</h1>
        </div>
        <div style="display:flex; align-items:center; gap:var(--space-2);">
          <select style="background:transparent; border:none; font-family:var(--font-label); font-weight:600; font-size:0.875rem; color:var(--primary); cursor:pointer; outline:none;" aria-label="Language Selector">
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
            <option value="bn">বাংলা</option>
          </select>
          <button id="profile-btn" class="icon-btn" aria-label="Profile">
            <span class="material-symbols-outlined">account_circle</span>
          </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content"></main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav" class="bottom-nav">
      <a href="#" class="nav-item active" data-page="home">
        <span class="material-symbols-outlined nav-icon">home</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="#" class="nav-item" data-page="scanner">
        <span class="material-symbols-outlined nav-icon">document_scanner</span>
        <span class="nav-label">Scanner</span>
      </a>
      <a href="#" class="nav-item" data-page="timeline">
        <span class="material-symbols-outlined nav-icon">timeline</span>
        <span class="nav-label">Timeline</span>
      </a>
      <a href="#" class="nav-item" data-page="mood">
        <span class="material-symbols-outlined nav-icon">wb_sunny</span>
        <span class="nav-label">Mood</span>
      </a>
    </nav>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
